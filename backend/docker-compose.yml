services:
  postgres:
    image: postgres:16-alpine
    container_name: financas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: financasdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financas-api
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=financasdb;Username=postgres;Password=postgres123"
      Jwt__Key: "SuperSecretKeyForFinancasApp2024MustBeAtLeast32Characters!"
      Jwt__Issuer: "FinancasAPI"
      Jwt__Audience: "FinancasApp"
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
